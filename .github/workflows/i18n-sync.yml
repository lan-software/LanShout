name: i18n sync (Tolgee)

on:
  schedule:
    - cron: '23 3 * * *'
  workflow_dispatch:

jobs:
  pull:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Pull translations from Tolgee
        env:
          TOLGEE_API_KEY: ${{ secrets.TOLGEE_API_KEY }}
        run: npm run i18n:pull

      - name: Create Pull Request on changes
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore(i18n): sync translations from Tolgee'
          title: 'chore(i18n): sync translations from Tolgee'
          body: |
            Nightly translation sync pulled from Tolgee Cloud (namespace: `lanshout`).

            Auto-generated by `.github/workflows/i18n-sync.yml`.
          branch: i18n/tolgee-sync
          delete-branch: true
          labels: i18n,automated
