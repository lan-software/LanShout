name: Merge weblate branch into main

on:
  push:
    branches: [weblate]
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - id: ff
        name: Fast-forward main from weblate
        run: |
          git fetch origin weblate:weblate
          if git merge-base --is-ancestor origin/main weblate; then
            git merge --ff-only weblate
            git push origin main
            echo "needs_pr=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs_pr=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR when not fast-forwardable
        if: steps.ff.outputs.needs_pr == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: weblate
          base: main
          title: "chore(i18n): merge translator updates from Weblate"
          body: |
            Translator updates from Weblate at https://weblate.sxcs.de

            Auto-generated by `.github/workflows/weblate-merge.yml` because the
            `weblate` branch was not a fast-forward of `main`.
          labels: i18n,automated
